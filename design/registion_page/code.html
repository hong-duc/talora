<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7311d4",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="flex flex-1 justify-center py-10 px-4 md:px-10 lg:px-40">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-primary/20 @[480px]:rounded-xl min-h-[320px] shadow-2xl shadow-primary/10 border border-primary/20" data-alt="A mystical library with floating books and purple light" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuACgmey03hP1avUNdKbcV4xKFUIiQBGkSkuRs5C2GFDoAgi_Y9S9rYbEgWZUHzXz87Kj_qZqQvmQLCwcbLwwMXPZXgxkzhrLJ_LPASkFMU7QZthlkT9qQotyYQKymfb0qPRttdaUMmLMl_MVCmdE8JXaJmVQeFR2pdtnqCMKrk9CeLYKD_vJdw9_6_OBjVziECZAC0LLoqTpn36YG99NNLaK9uK06ogDFCeNohRlyqkJdjTW4DOuDIPRtCEm8FxNSTcBQc5QeyrX78");'>
</div>
</div>
</div>
<div class="flex flex-wrap justify-between gap-3 p-4 mt-6">
<div class="flex min-w-72 flex-col gap-2">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-black leading-tight tracking-[-0.033em]">Request a Seal</h1>
<p class="text-primary dark:text-primary/70 text-lg font-medium leading-normal">Join the seekers of ancient knowledge at The Whispering Library</p>
</div>
</div>
<form class="flex flex-col gap-2">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-200 text-base font-medium leading-normal pb-2">Seeker Alias</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Enter your moniker" type="text" value=""/>
</label>
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-200 text-base font-medium leading-normal pb-2">Mystic Email</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 p-[15px] text-base font-normal leading-normal transition-all" placeholder="oracle@library.com" type="email" value=""/>
</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-200 text-base font-medium leading-normal pb-2">Secret Incantation</p>
<div class="flex w-full flex-1 items-stretch rounded-xl">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="••••••••" type="password" value=""/>
<div class="text-primary/60 flex border border-primary/20 bg-white dark:bg-background-dark/50 items-center justify-center pr-[15px] rounded-r-xl border-l-0">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-200 text-base font-medium leading-normal pb-2">Confirm Incantation</p>
<div class="flex w-full flex-1 items-stretch rounded-xl">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-white dark:bg-background-dark/50 focus:border-primary h-14 placeholder:text-slate-400 dark:placeholder:text-primary/40 p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="••••••••" type="password" value=""/>
<div class="text-primary/60 flex border border-primary/20 bg-white dark:bg-background-dark/50 items-center justify-center pr-[15px] rounded-r-xl border-l-0">
<span class="material-symbols-outlined">lock_reset</span>
</div>
</div>
</label>
</div>
<div class="px-4 py-6">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-xl transition-all shadow-lg shadow-primary/25 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">auto_fix_high</span>
                                Invoke Membership
                            </button>
</div>
</form>
<div class="px-4 py-2 flex items-center gap-4">
<div class="h-px bg-primary/20 flex-1"></div>
<p class="text-primary/60 text-sm font-medium uppercase tracking-widest">Or Bind Via</p>
<div class="h-px bg-primary/20 flex-1"></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 px-4 py-4">
<button class="flex items-center justify-center gap-3 h-14 rounded-xl border border-primary/20 bg-white dark:bg-background-dark/30 hover:bg-primary/5 transition-colors text-slate-900 dark:text-slate-100 font-medium">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                            Bind with Google
                        </button>
<button class="flex items-center justify-center gap-3 h-14 rounded-xl border border-primary/20 bg-white dark:bg-background-dark/30 hover:bg-primary/5 transition-colors text-slate-900 dark:text-slate-100 font-medium">
<svg class="w-6 h-6" viewbox="0 0 24 24">
<path d="M19.27 4.73C17.78 3.35 15.83 2.5 13.73 2.5c-4.54 0-8.23 3.69-8.23 8.23 0 2.1.79 4.02 2.08 5.5l-2.08 4.77 4.77-2.08c1.48 1.29 3.4 2.08 5.5 2.08 4.54 0 8.23-3.69 8.23-8.23 0-2.1-.85-4.05-2.23-5.54zM13.73 17.5c-3.72 0-6.73-3.01-6.73-6.73s3.01-6.73 6.73-6.73 6.73 3.01 6.73 6.73-3.01 6.73-6.73 6.73z" fill="currentColor"></path>
</svg>
                            Echo with Discord
                        </button>
</div>
<div class="px-4 py-8 text-center">
<p class="text-slate-600 dark:text-primary/50 text-base">
                            Already a keeper of secrets? 
                            <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Recall Access</a>
</p>
</div>
</div>
</div>
</div>
</div>
</body></html>
